<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orange SyncLog</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #070b0d;
      color: #fff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(0, 0, 0, .50), rgba(0, 0, 0, .82)),
        radial-gradient(circle at top, rgba(255, 121, 0, .22), transparent 35%),
        #070b0d;
    }
    main {
      width: min(560px, 100%);
      border: 1px solid rgba(255, 255, 255, .22);
      background: rgba(0, 0, 0, .55);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 20px 70px rgba(0, 0, 0, .42);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 18px;
      color: rgba(255, 255, 255, .78);
      line-height: 1.5;
    }
    a.button {
      display: inline-block;
      margin-top: 8px;
      padding: 14px 20px;
      border-radius: 8px;
      background: #ff7900;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
    .note {
      margin-top: 22px;
      font-size: 14px;
      color: rgba(255, 255, 255, .66);
    }
  </style>
</head>
<body>
  <main>
    <h1>Orange SyncLog</h1>
    <p>Application Android pour synchroniser automatiquement les logs de vol DJI vers le serveur FTP.</p>
    <a class="button" href="Orange-SyncLog.apk" download>Telecharger l'APK</a>
    <p class="note">Sur la radiocommande DJI, ouvrez cette page, telechargez l'APK, puis autorisez l'installation depuis le navigateur si Android le demande.</p>
  </main>
</body>
</html>
